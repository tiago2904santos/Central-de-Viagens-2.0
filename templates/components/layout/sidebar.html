<aside class="sidebar" aria-label="Navegacao principal">
  <a class="sidebar-brand" href="{% url 'core:dashboard' %}">Central de Viagens 3</a>
  <nav class="sidebar-nav">
    {% for item in navigation_items %}
      {% url item.url_name as nav_url %}
      <a href="{{ nav_url }}" {% if request.resolver_match.view_name == item.url_name %}aria-current="page"{% endif %}>
        {{ item.label }}
      </a>
    {% endfor %}
  </nav>
</aside>
