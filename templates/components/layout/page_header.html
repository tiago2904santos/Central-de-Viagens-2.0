<div class="page-header">
  <div>
    <span class="eyebrow page-header__eyebrow">{{ eyebrow|default:"Modulo" }}</span>
    <h2 class="page-header__title">{{ title }}</h2>
    {% if description %}
      <p class="page-header__description">{{ description }}</p>
    {% endif %}
  </div>
  {% if action_label and action_url %}
    <div class="page-header-actions">
      {% include "components/buttons/action_button.html" with href=action_url label=action_label variant="primary" only %}
    </div>
  {% endif %}
</div>
