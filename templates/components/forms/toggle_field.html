{% comment %}
Toggle estilo botão (checkbox oculto), alinhado ao padrão visual do "Data única" do legacy (pill + estado),
reimplementado com tokens do design system (azul/amarelo).
{% endcomment %}
<div class="field field-toggle">
  <div class="app-toggle{% if field.value %} is-checked{% endif %}" data-app-toggle>
    {{ field.as_widget }}
    <label class="app-toggle__control" for="{{ field.id_for_label }}">
      <span class="app-toggle__track" aria-hidden="true"><span class="app-toggle__knob"></span></span>
      <span class="app-toggle__text">{{ field.label }}</span>
    </label>
  </div>
  {% if field.errors %}<p class="field-error">{{ field.errors|striptags }}</p>{% endif %}
</div>
