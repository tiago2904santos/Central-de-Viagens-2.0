<div class="field{% if field.field.widget.input_type == 'checkbox' %} field-check{% endif %}">
  {% if field.field.widget.input_type == 'checkbox' %}
    {{ field }}
    <label for="{{ field.id_for_label }}">{{ label|default:field.label }}</label>
  {% else %}
  <label for="{{ field.id_for_label }}">{{ label|default:field.label }}</label>
  {{ field }}
  {% endif %}
  {% if help_text %}<p class="field-help">{{ help_text }}</p>{% endif %}
  {% if field.errors %}<p class="field-error">{{ field.errors|striptags }}</p>{% endif %}
</div>
