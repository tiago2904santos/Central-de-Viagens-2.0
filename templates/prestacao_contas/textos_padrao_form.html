{% extends 'base.html' %}

{% block title %}Texto Padrão{% endblock %}

{% block content %}
<section class="rt-page-shell">
    <article class="card rt-card">
        <h1 class="rt-title">{% if obj %}Editar{% else %}Novo{% endif %} texto padrão</h1>
        <form method="post" class="rt-form-layout mt-3">
            {% csrf_token %}
            <div class="rt-grid rt-grid-2">
                <div class="form-group"><label for="{{ form.categoria.id_for_label }}">Categoria</label>{{ form.categoria }}</div>
                <div class="form-group"><label for="{{ form.titulo.id_for_label }}">Título</label>{{ form.titulo }}</div>
            </div>
            <div class="form-group"><label for="{{ form.texto.id_for_label }}">Texto</label>{{ form.texto }}</div>
            <div class="rt-grid rt-grid-3">
                <div class="form-group"><label for="{{ form.ordem.id_for_label }}">Ordem</label>{{ form.ordem }}</div>
                <div class="form-group"><label>Padrão</label><div class="form-check">{{ form.is_padrao }} <label class="form-check-label" for="{{ form.is_padrao.id_for_label }}">Definir como padrão</label></div></div>
                <div class="form-group"><label>Ativo</label><div class="form-check">{{ form.ativo }} <label class="form-check-label" for="{{ form.ativo.id_for_label }}">Ativo</label></div></div>
            </div>
            <div class="rt-actions">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a class="btn btn-outline-secondary" href="{% url 'prestacao_contas:textos-padrao' %}">Voltar</a>
            </div>
        </form>
    </article>
</section>
{% endblock %}
