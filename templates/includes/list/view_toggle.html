<div class="system-list-view-toggle oficios-view-toggle" role="group" aria-label="{{ aria_label|default:'Alternar visualizacao da lista' }}">
    <button
        type="button"
        class="system-list-view-toggle__button oficios-view-toggle__button is-active"
        data-list-view-toggle="rich"
        aria-pressed="true"
    >
        Completa
    </button>
    <button
        type="button"
        class="system-list-view-toggle__button oficios-view-toggle__button"
        data-list-view-toggle="basic"
        aria-pressed="false"
    >
        Visualizacao unica
    </button>
</div>
