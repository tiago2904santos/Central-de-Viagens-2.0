<a href="{{ open_url }}" class="btn btn-sm btn-doc-action btn-doc-action--primary" aria-label="{{ open_aria|default:'Abrir documento' }}">
    <i class="bi bi-box-arrow-up-right"></i>
    <span>Abrir</span>
</a>
{% if docx_url %}
<a href="{{ docx_url }}" class="btn btn-sm btn-doc-action btn-doc-action--secondary is-icon-only" aria-label="{{ docx_aria|default:'Baixar DOCX' }}" data-direct-download="true">
    <i class="bi bi-filetype-docx"></i>
    <span class="visually-hidden">DOCX</span>
</a>
{% endif %}
{% if pdf_url %}
<a href="{{ pdf_url }}" class="btn btn-sm btn-doc-action btn-doc-action--pdf is-icon-only" aria-label="{{ pdf_aria|default:'Baixar PDF' }}" data-direct-download="true">
    <i class="bi bi-filetype-pdf"></i>
    <span class="visually-hidden">PDF</span>
</a>
{% endif %}
{% if delete_url %}
<a href="{{ delete_url }}" class="btn btn-sm btn-doc-action btn-doc-action--danger is-icon-only" aria-label="{{ delete_aria|default:'Excluir documento' }}">
    <i class="bi bi-trash3"></i>
    <span class="visually-hidden">Excluir</span>
</a>
{% endif %}
