<div class="page-header-cadastro system-list-header system-list-header--standard">
    <div class="system-list-header__content">
        <div>
            <h1 class="system-list-header__title">{{ title }}</h1>
            {% if subtitle %}
            <p class="system-list-header__subtitle">{{ subtitle }}</p>
            {% endif %}
        </div>
    </div>
    <div class="d-flex gap-2 flex-wrap system-list-header__actions system-list-header__actions-group">
        {% if tertiary_url %}
        <a href="{{ tertiary_url }}" class="btn btn-outline-secondary system-list-action-btn">{{ tertiary_label|default:'Voltar' }}</a>
        {% endif %}
        {% if secondary_url %}
        <a href="{{ secondary_url }}" class="btn btn-outline-secondary system-list-action-btn">{{ secondary_label }}</a>
        {% endif %}
    </div>
</div>
