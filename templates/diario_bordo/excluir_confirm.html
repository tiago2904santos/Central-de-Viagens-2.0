{% extends 'base.html' %}
{% block title %}Excluir Diário de Bordo{% endblock %}
{% block content %}
<div class="app-page-shell app-page-shell--confirm">
  <div class="app-page-shell__inner">
    <div class="card app-page-card app-page-card--spacious"><div class="card-body">
      <div class="oficio-stage-intro"><div><span class="oficio-stage-kicker">Diário de Bordo</span><h1 class="oficio-stage-title">Excluir diário</h1><p class="oficio-stage-description">Confirme a exclusão do Diário de Bordo {{ diario.numero_oficio|default:diario.pk }}.</p></div></div>
      <form method="post" class="oficio-wizard-footer-actions">{% csrf_token %}<a href="{% url 'diario_bordo:lista' %}" class="btn btn-outline-secondary">Cancelar</a><button type="submit" class="btn btn-danger">Excluir</button></form>
    </div></div>
  </div>
</div>
{% endblock %}
