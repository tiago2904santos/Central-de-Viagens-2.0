<nav class="oficio-stepper" aria-label="Etapas do ofício">
  {% for item in wizard_steps %}
  <a
    href="{{ item.url }}"
    data-step-key="{{ item.key }}"
    class="oficio-stepper-link is-{{ item.state }}{% if item.active %} is-active{% endif %}"
    {% if not item.active %}data-autosave-link="1"{% endif %}
    aria-current="{% if item.active %}step{% else %}false{% endif %}"
  >
    <span class="oficio-stepper-badge">{{ item.number }}</span>
    <span class="oficio-stepper-copy">
      <span class="oficio-stepper-state">
        {% if item.state == 'completed' %}Concluído{% elif item.active %}Etapa atual{% else %}Pendente{% endif %}
      </span>
      <span class="oficio-stepper-label">{{ item.label }}</span>
    </span>
  </a>
  {% endfor %}
</nav>
