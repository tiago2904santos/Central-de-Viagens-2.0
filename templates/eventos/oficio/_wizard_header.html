<div class="oficio-wizard-header mb-2" data-oficio-sticky-header>
  <div class="card shadow-sm border-0 oficio-wizard-header-card">
    <div class="card-body">
      <div class="oficio-wizard-header-top">
        <div class="oficio-wizard-header-copy">
          <h1 class="h4 mb-1">{{ wizard_page_title }}</h1>
        </div>
        <div class="oficio-wizard-actions">
          <a href="{% url 'eventos:oficios-global' %}" class="btn btn-outline-secondary btn-sm" data-autosave-link="1">Lista de ofícios</a>
          {% if oficio.pk %}
          <a href="{% url 'eventos:oficio-excluir' oficio.pk %}" class="btn btn-outline-danger btn-sm" data-autosave-link="1">Excluir ofício</a>
          {% endif %}
        </div>
      </div>
      {% include 'eventos/oficio/_wizard_stepper.html' %}
    </div>
  </div>
</div>
