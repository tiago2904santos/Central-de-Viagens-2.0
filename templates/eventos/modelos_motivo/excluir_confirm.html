{% extends 'base.html' %}

{% block title %}Excluir modelo de motivo — Central de Viagens{% endblock %}
{% block page_title %}Excluir modelo de motivo{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="card form-card">
        <div class="card-body">
            <p>Confirma excluir o modelo <strong>{{ object.nome }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Excluir</button>
                <a href="{% url 'eventos:modelos-motivo-lista' %}{% if volta_step1 %}?volta_step1={{ volta_step1 }}{% endif %}" class="btn btn-outline-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
