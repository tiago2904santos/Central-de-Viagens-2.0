<article class="termo-doc-card__viatura-card oficio-list-surface oficio-list-surface--soft{% if item.css_class %} {{ item.css_class }}{% endif %}">
    <div class="termo-doc-card__viatura-head">
        <div class="termo-doc-card__viatura-head-copy">
            <div class="termo-doc-card__viatura-title">{{ item.titulo }}</div>
        </div>
        <div class="termo-doc-card__viatura-type">
            <i class="bi {{ item.icon }}"></i>
            <span>{{ item.tipo_label }}</span>
        </div>
    </div>

    {% if servidores %}
    <div class="termo-doc-card__viatura-servers">
        <div class="termo-doc-card__servidores-list termo-doc-card__servidores-list--nested">
            {% for item in servidores %}
            {% include 'eventos/documentos/partials/_termo_derivacao_item.html' with item=item only %}
            {% empty %}
            <div class="termo-doc-card__empty-block oficio-list-surface oficio-list-surface--soft">
                <span class="termo-doc-card__empty">Nenhum servidor vinculado.</span>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}
</article>
