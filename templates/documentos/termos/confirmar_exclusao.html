{% extends 'base.html' %}
{% block title %}Excluir termo{% endblock %}
{% block page_title %}Excluir termo{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm" style="max-width:600px">
  <div class="card-body">
    <div class="d-flex align-items-center mb-3">
      <i class="bi bi-exclamation-triangle-fill text-danger fs-2 me-3"></i>
      <h5 class="mb-0">Confirmar exclusão</h5>
    </div>
    <p>Tem certeza que deseja excluir o termo <strong>{{ termo.titulo|default:termo }}</strong>?</p>
    <form method="post" class="d-flex gap-2">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Confirmar exclusão</button>
      <a href="{% url 'documentos:termos' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
