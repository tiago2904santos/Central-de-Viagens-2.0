{% extends 'base.html' %}
{% block title %}{% if termo %}Editar termo{% else %}Novo termo{% endif %}{% endblock %}
{% block page_title %}{% if termo %}Editar termo{% else %}Novo termo{% endif %}{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm" style="max-width:700px">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {% if return_to %}<input type="hidden" name="return_to" value="{{ return_to }}">{% endif %}
      <div class="mb-3">
        <label class="form-label">Título</label>
        <input type="text" name="titulo" class="form-control" value="{{ termo.titulo|default:'' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Conteúdo</label>
        <textarea name="conteudo" class="form-control" rows="6">{{ termo.conteudo|default:'' }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Ofício vinculado (opcional)</label>
        <select name="oficio_id" class="form-select">
          <option value="">— Nenhum —</option>
          {% for o in oficios %}
          <option value="{{ o.pk }}" {% if termo.oficio_id == o.pk %}selected{% endif %}>{{ o.identificacao }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-dark">Salvar</button>
        <a href="{% url 'documentos:termos' %}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
